name: Sync portfolio activity

on:
  push:
    branches: [main]
    paths-ignore: [data/activity.json]
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Refresh public coding activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-activity.mjs
      - name: Commit refreshed activity when changed
        run: |
          git config user.name "portfolio-activity-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/activity.json
          git diff --cached --quiet || git commit -m "chore: sync portfolio activity"
          git push
